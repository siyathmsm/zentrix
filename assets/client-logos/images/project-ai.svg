<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc"><title id="title">Synapse artificial intelligence copilot</title><desc id="desc">Futuristic AI workflow and conversation interface</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090b10"/><stop offset="1" stop-color="#241b2c"/></linearGradient><linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e6d6aa"/><stop offset="1" stop-color="#8b6a42"/></linearGradient><filter id="blur"><feGaussianBlur stdDeviation="30"/></filter></defs>
<rect width="1000" height="650" fill="url(#bg)"/><circle cx="740" cy="190" r="190" fill="#9d70c7" opacity=".12" filter="url(#blur)"/><circle cx="220" cy="530" r="180" fill="#cdb885" opacity=".08" filter="url(#blur)"/>
<g opacity=".1" stroke="#cdb885"><path d="M0 80h1000M0 160h1000M0 240h1000M0 320h1000M0 400h1000M0 480h1000M0 560h1000"/><path d="M100 0v650M200 0v650M300 0v650M400 0v650M500 0v650M600 0v650M700 0v650M800 0v650M900 0v650"/></g>
