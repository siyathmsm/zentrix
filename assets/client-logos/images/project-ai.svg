<g transform="translate(330 100)" font-family="Arial"><text x="0" y="25" fill="#f1ece3" font-size="22" font-weight="700">Good morning, Daniel.</text><text x="0" y="52" fill="#8c8680" font-size="13">What would you like to accelerate today?</text><g transform="translate(0 90)"><rect width="525" height="84" rx="18" fill="#191c23" stroke="#cdb885" stroke-opacity=".13"/><circle cx="42" cy="42" r="18" fill="#cdb885" opacity=".16"/><path d="M34 42h16m-8-8v16" stroke="#cdb885" stroke-width="2"/><text x="76" y="37" fill="#e8e2d8" font-size="13" font-weight="700">Analyze this quarter's customer feedback</text><text x="76" y="58" fill="#817b75" font-size="11">Find themes, risks, and product opportunities</text></g><g transform="translate(0 194)"><rect width="525" height="160" rx="20" fill="#151820" stroke="#cdb885" stroke-opacity=".13"/><text x="25" y="35" fill="#cdb885" font-size="12" font-weight="700">AI RESPONSE</text><rect x="25" y="57" width="430" height="8" rx="4" fill="#ddd5c8" opacity=".75"/><rect x="25" y="78" width="467" height="8" rx="4" fill="#8c8680" opacity=".45"/><rect x="25" y="99" width="390" height="8" rx="4" fill="#8c8680" opacity=".45"/><rect x="25" y="120" width="446" height="8" rx="4" fill="#8c8680" opacity=".45"/></g><g transform="translate(0 380)"><rect width="525" height="64" rx="18" fill="#191c23" stroke="#cdb885" stroke-opacity=".18"/><text x="22" y="39" fill="#8c8680" font-size="12">Ask Synapse anything...</text><circle cx="485" cy="32" r="20" fill="url(#gold)"/><path d="m478 33 7 0m0 0-3-3m3 3-3 3" stroke="#2a2117" stroke-width="2" fill="none"/></g></g>
